<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — DepressionCheck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">

    <div style="text-align:center; margin-bottom:32px;">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;">🧠</div>
      <h2 style="font-family:'DM Serif Display',serif; font-size:28px; color:var(--navy); margin-bottom:6px;">Admin Panel</h2>
      <p style="font-size:14px; color:var(--text-light);">Masuk untuk mengelola data DepressionCheck</p>
    </div>

    {% if error %}
    <div style="background:#FEF2F2; border:1px solid #FECACA; border-radius:10px; padding:12px 16px; font-size:14px; color:#C53030; margin-bottom:20px;">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label style="font-size:13px; font-weight:600; color:var(--text-dark); display:block; margin-bottom:6px;">Username</label>
        <input type="text" name="username" class="form-control-modern" placeholder="Masukkan username" required autofocus>
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label style="font-size:13px; font-weight:600; color:var(--text-dark); display:block; margin-bottom:6px;">Password</label>
        <input type="password" name="password" class="form-control-modern" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn-blue" style="margin-top:24px;">
        Masuk ke Panel Admin
      </button>
    </form>

    <div style="text-align:center; margin-top:24px;">
      <a href="/" style="font-size:13px; color:var(--text-light); text-decoration:none;">← Kembali ke Beranda</a>
    </div>

  </div>
</div>
</body>
</html>
