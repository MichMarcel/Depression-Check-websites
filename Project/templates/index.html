<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <h2 class="text-center">Prediksi Depresi Mahasiswa</h2>

    <form action="/predict" method="post" class="card p-4 shadow">

        <input class="form-control mb-2" name="age" placeholder="Age" required>
        <input class="form-control mb-2" name="cgpa" placeholder="CGPA" required>
        <input class="form-control mb-2" name="study" placeholder="Study Hours" required>
        <input class="form-control mb-2" name="sleep" placeholder="Sleep Duration" required>
        <input class="form-control mb-2" name="social" placeholder="Social Media Hours" required>
        <input class="form-control mb-2" name="activity" placeholder="Physical Activity" required>
        <input class="form-control mb-2" name="stress" placeholder="Stress Level" required>

        <select class="form-control mb-2" name="gender">
            <option value="">Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <select class="form-control mb-2" name="department">
            <option value="">Department</option>
            <option>Engineering</option>
            <option>Business</option>
            <option>Arts</option>
            <option>Medical</option>
            <option>Science</option>
        </select>

        <button class="btn btn-primary">Predict</button>
    </form>
</div>
